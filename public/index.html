<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>nachidev</title>
  <meta name="description" content="nachidev — coming soon." />
  <style>
    :root {
      --bg: #0a0a0f;
      --fg: #f5f5f7;
      --muted: #8a8a99;
      --accent: #7c5cff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      background: radial-gradient(120% 120% at 50% 0%, #14141f 0%, var(--bg) 60%);
      color: var(--fg);
      display: grid;
      place-items: center;
      min-height: 100dvh;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 42rem; }
    .logo {
      font-size: clamp(2.5rem, 10vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .logo b { color: var(--accent); }
    .cursor {
      display: inline-block;
      width: 0.6ch;
      background: var(--accent);
      animation: blink 1.1s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    p {
      margin-top: 1.5rem;
      color: var(--muted);
      font-size: clamp(0.9rem, 2.5vw, 1.05rem);
      line-height: 1.6;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #37d67a;
      margin-right: 0.5rem;
      box-shadow: 0 0 10px #37d67a;
      vertical-align: middle;
    }
    footer {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="logo">nachi<b>dev</b><span class="cursor">&nbsp;</span></div>
    <p><span class="dot"></span>Something is being built here.</p>
    <footer>nachidev.com.ar</footer>
  </main>
</body>
</html>
